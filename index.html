<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="format-detection" content="telephone=no" />
  <title>临时停车，请多关照</title>
  <style>
    :root {
      --primary: #2fc263;
      --primary-active: #26ad56;
      --surface: #ffffff;
      --page: #f4f7fb;
      --text-strong: #121826;
      --text-muted: #6b7280;
      --secondary-bg: #eef2f7;
      --secondary-text: #344054;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47, 194, 99, 0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(84, 111, 255, 0.08), transparent 28%),
        var(--page);
      color: var(--text-strong);
    }

    .shell {
      width: min(100%, 480px);
    }

    .card {
      background: var(--surface);
      border-radius: 32px;
      padding: 36px 28px 30px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .icon-ring {
      width: 76px;
      height: 76px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #e9f8ef;
    }

    .icon-ring svg {
      width: 34px;
      height: 34px;
      fill: var(--primary);
    }

    .title {
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .button {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s ease, background-color 0.15s ease, opacity 0.15s ease;
    }

    .button:active {
      transform: scale(0.97);
    }

    .button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .button-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .button-primary:active {
      background: var(--primary-active);
    }

    .button-secondary {
      background: var(--secondary-bg);
      color: var(--secondary-text);
    }

    .button-secondary:active {
      background: #e4e9f0;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: #98a2b3;
      font-size: 14px;
      line-height: 1.5;
    }

    .footer svg {
      width: 15px;
      height: 15px;
      vertical-align: -2px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="icon-ring" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z" />
        </svg>
      </div>

      <h1 class="title">微信扫码挪车</h1>
      <p class="subtitle">
        临时停车，请多关照。<br />
        如影响通行，请直接联系车主。
      </p>

      <div class="actions">
        <a id="callBtn" class="button button-primary" href="tel:13800138000">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 4.5a3 3 0 0 1 3-3h1.372c.86 0 1.61.586 1.819 1.42l1.105 4.423a1.875 1.875 0 0 1-.694 1.955l-1.293.97c-.135.101-.164.249-.126.352a11.285 11.285 0 0 0 6.697 6.697c.103.038.25.009.352-.126l.97-1.293a1.875 1.875 0 0 1 1.955-.694l4.423 1.105c.834.209 1.42.959 1.42 1.82V19.5a3 3 0 0 1-3 3h-2.25C8.552 22.5 1.5 15.448 1.5 6.75V4.5z" />
          </svg>
          电话通知
        </a>
        <a id="smsBtn" class="button button-secondary" href="#">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4.804 21.644A6.707 6.707 0 0 0 6 21.75a6.721 6.721 0 0 0 3.583-1.029c.774.182 1.584.279 2.417.279 5.322 0 9.75-3.97 9.75-9 0-5.03-4.428-9-9.75-9s-9.75 3.97-9.75 9c0 2.409 1.025 4.587 2.674 6.192.232.226.277.428.254.543a3.73 3.73 0 0 1-.814 1.686.75.75 0 0 0 .44 1.223zM8.25 10.875a1.125 1.125 0 1 0 0 2.25 1.125 1.125 0 0 0 0-2.25zm4.875 0a1.125 1.125 0 1 0 0 2.25 1.125 1.125 0 0 0 0-2.25zm4.875 0a1.125 1.125 0 1 0 0 2.25 1.125 1.125 0 0 0 0-2.25z" />
          </svg>
          短信通知
        </a>
      </div>
    </section>

    <p class="footer">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.25A9.75 9.75 0 1 0 21.75 12 9.761 9.761 0 0 0 12 2.25zm0 13.5a.938.938 0 1 1 .938-.938.938.938 0 0 1-.938.938zm1.125-4.5a1.125 1.125 0 0 1-2.25 0V7.875a1.125 1.125 0 0 1 2.25 0z" />
      </svg>
      本服务仅提供便利，不收集任何个人隐私
    </p>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var phone = (params.get("phone") || "13800138000").replace(/[^\d+]/g, "");
      var callBtn = document.getElementById("callBtn");
      var smsBtn = document.getElementById("smsBtn");
      var message = "您好，您的车挡路了，请尽快挪车。";
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      var separator = isIOS ? "&" : "?";

      callBtn.href = "tel:" + phone;
      smsBtn.href = "sms:" + phone + separator + "body=" + encodeURIComponent(message);
    })();
  </script>
</body>
</html>
