<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>临时停车，请多关照</title>
  <style>
    :root {
      --primary: #07C160; 
      --primary-active: #06AD56;
      --bg: #F5F7FA;
      --card-bg: #FFFFFF;
      --text-title: #111418;
      --text-subtitle: #717680;
      --btn-secondary-bg: #F2F4F7;
      --btn-secondary-text: #344054;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      padding: 0 24px;
      max-width: 400px;
      z-index: 1;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px 24px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.03);
      text-align: center;
      margin-bottom: 24px;
    }

    .header-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px auto;
      background: #EAF8F0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 36px;
      height: 36px;
      fill: var(--primary);
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-title);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-subtitle);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Standardized 1:1 Equal Width Grid Layout */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
    }

    .btn {
      display: flex;
      flex-direction: row; /* Horizontal icon + text looks pill-like and sleek */
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 54px;
      border-radius: 16px; /* Smooth squircle */
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease-out;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn svg {
      width: 20px;
      height: 20px;
    }

    /* Call Button */
    .btn-primary {
      background: var(--primary);
      color: #FFFFFF;
    }
    
    .btn-primary:active {
      background: var(--primary-active);
    }

    /* SMS Button */
    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-text);
    }

    .btn-secondary:active {
      background: #E4E7EC;
    }

    .btn-secondary svg {
      fill: currentColor;
    }

    .footer {
      font-size: 13px;
      color: #98A2B3;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      
      <div class="header-icon">
        <!-- Clean Car Icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
        </svg>
      </div>
      
      <h1 class="title">我的车挡路了？</h1>
      <p class="subtitle">给您带来通行不便，非常抱歉。<br/>请点击下方按钮，我将立即过来挪车。</p>

      <div class="actions">
        <!-- Equal size left/right buttons, clean horizontal layout -->
        <a href="tel:17300987266" class="btn btn-primary" id="callBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path fill-rule="evenodd" d="M1.5 4.5a3 3 0 013-3h1.372c.86 0 1.61.586 1.819 1.42l1.105 4.423a1.875 1.875 0 01-.694 1.955l-1.293.97c-.135.101-.164.249-.126.352a11.285 11.285 0 006.697 6.697c.103.038.25.009.352-.126l.97-1.293a1.875 1.875 0 011.955-.694l4.423 1.105c.834.209 1.42.959 1.42 1.82V19.5a3 3 0 01-3 3h-2.25C8.552 22.5 1.5 15.448 1.5 6.75V4.5z" clip-rule="evenodd" />
          </svg>
          拨打车主
        </a>

        <a href="#" id="smsBtn" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path fill-rule="evenodd" d="M4.804 21.644A6.707 6.707 0 006 21.75a6.721 6.721 0 003.583-1.029c.774.182 1.584.279 2.417.279 5.322 0 9.75-3.97 9.75-9 0-5.03-4.428-9-9.75-9s-9.75 3.97-9.75 9c0 2.409 1.025 4.587 2.674 6.192.232.226.277.428.254.543a3.73 3.73 0 01-.814 1.686.75.75 0 00.44 1.223zM8.25 10.875a1.125 1.125 0 100 2.25 1.125 1.125 0 000-2.25zM10.875 12a1.125 1.125 0 112.25 0 1.125 1.125 0 01-2.25 0zm4.875-1.125a1.125 1.125 0 100 2.25 1.125 1.125 0 000-2.25z" clip-rule="evenodd" />
          </svg>
          发送短信
        </a>
      </div>
    </div>

    <!-- Security/trust indicator strictly outside the card for clean separation -->
    <div class="footer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm8.706-1.442c1.146-.573 2.437.463 2.126 1.706l-.709 2.836.042-.02a.75.75 0 01.67 1.34l-.04.022c-1.147.573-2.438-.463-2.127-1.706l.71-2.836-.042.02a.75.75 0 11-.671-1.34l.041-.022zM12 9a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" />
      </svg>
      本服务仅提供便利，不收集任何个人隐私
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // 1. 获取 URL 中的 phone 参数
      var urlParams = new URLSearchParams(window.location.search);
      var phone = urlParams.get('phone') || "17300987266";
      
      // 2. 注入拨号按钮
      var callBtn = document.getElementById("callBtn");
      if (callBtn) {
        callBtn.href = "tel:" + phone;
      }

      // 3. 注入短信按钮，并兼容 iOS
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      var smsBtn = document.getElementById("smsBtn");
      if (smsBtn) {
        var msg = "您好，您的车挡路了，请尽快挪车。";
        var separator = isIOS ? "&" : "?";
        smsBtn.href = "sms:" + phone + separator + "body=" + encodeURIComponent(msg);
      }
    });
  </script>
</body>
</html>
